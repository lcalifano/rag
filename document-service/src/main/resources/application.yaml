server:
  port: 8083

spring:
  application:
    name: DOCUMENT-SERVICE
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/document_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

app:
  chunk-size: 400
  chunk-overlap: 80
  similar-chunks: 5
  upload-dir: ${UPLOAD_DIR:./uploads}

llm-service:
  url: ${LLM_SERVICE_URL:http://localhost:8000}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health
