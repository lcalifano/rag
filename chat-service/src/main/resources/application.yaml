server:
  port: 8082

spring:
  application:
    name: CHAT-SERVICE
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/chat_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true

app:
  similar-chunks: 5
  chat-temperature: 0.7

llm-service:
  url: ${LLM_SERVICE_URL:http://localhost:8000}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health
