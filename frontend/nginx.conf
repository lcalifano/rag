server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 50M;

    # SPA routing - tutte le route vanno a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # SSE endpoint - no buffering
    location /api/chat/sessions/ {
        proxy_pass http://api-gateway:8080/chat/sessions/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;

        # Disabilita buffering per SSE
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_set_header X-Accel-Buffering no;
    }

    # Proxy verso API Gateway
    location /api/ {
        proxy_pass http://api-gateway:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Timeout alti per le risposte lente di Ollama
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
    }
}
