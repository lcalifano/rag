server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 50M;

    # SPA routing - tutte le route vanno a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # WebSocket proxy — deve stare PRIMA di /api/ perché nginx usa il primo
    # location che matcha. Inoltra gli header Upgrade e Connection necessari
    # per l'handshake HTTP → WebSocket. Senza questi header il gateway
    # (o il chat-service) risponde 400 "invalid Upgrade header: null".
    location /api/ws/ {
        proxy_pass http://api-gateway:8080/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Timeout lungo: il WebSocket resta aperto per tutta la sessione di chat
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Avvio flusso OAuth2 (es. /oauth2/authorization/google)
    location /oauth2/ {
        proxy_pass http://api-gateway:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    # Callback OAuth2 dal provider (es. /login/oauth2/code/google)
    location /login/ {
        proxy_pass http://api-gateway:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    # Proxy verso API Gateway
    location /api/ {
        proxy_pass http://api-gateway:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Timeout alti per le risposte lente di Ollama
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
    }
}
