server:
  port: 8080

spring:
  application:
    name: API-GATEWAY
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  cloud:
    gateway:
      httpclient:
        connect-timeout: 10000
        response-timeout: 300s
      forwarded:
        enabled: true
      routes:
        - id: oauth2-authorization
          uri: lb://USER-SERVICE
          predicates:
            - Path=/oauth2/authorization/**

        - id: oauth2-callback
          uri: lb://USER-SERVICE
          predicates:
            - Path=/login/oauth2/code/**

        - id: auth-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/auth/**

        - id: user-llm-config
          uri: lb://USER-SERVICE
          predicates:
            - Path=/model/**

        - id: user-profile
          uri: lb://USER-SERVICE
          predicates:
            - Path=/users/**

        - id: admin
          uri: lb://USER-SERVICE
          predicates:
            - Path=/admin/**

        - id: chat-service
          uri: lb://CHAT-SERVICE
          predicates:
            - Path=/chat/**

        - id: document-service
          uri: lb://DOCUMENT-SERVICE
          predicates:
            - Path=/documents/**

jwt:
  secret: ${JWT_SECRET:my-super-secret-key-that-is-at-least-256-bits-long-for-hmac-sha256}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health
